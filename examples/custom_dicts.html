<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OpenCC FMMSEG WASM Custom Dictionaries</title>
</head>
<body>
<pre id="out">Loading...</pre>

<script type="module">
    import init, {OpenccWasm} from "../pkg/opencc_fmmseg_wasm.js";

    const out = document.getElementById("out");

    try {
        await init();

        const cc = OpenccWasm.newWithCustomDicts("s2t", [
            {
                slot: "STPhrases",
                mode: "Append",
                pairs: [
                    ["её•е…°и’Ӯе°”", "жҹҸиҳӯи’ӮзҲҫ"],
                    ["иҪҜд»¶", "и»ҹй«”"]
                ]
            }
        ]);

        const input = "её•е…°и’Ӯе°”иҪҜд»¶";
        const output = cc.convert(input, false);

        out.textContent =
            `Input:  ${input}\n` +
            `Output: ${output}\n\n` +
            (output === "жҹҸиҳӯи’ӮзҲҫи»ҹй«”" ? "PASS" : "FAIL");
    } catch (e) {
        out.textContent = String(e?.stack ?? e);
    }
</script>
</body>
</html>
