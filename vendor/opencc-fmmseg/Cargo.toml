#[workspace]
#members = [
#    "capi/opencc-fmmseg-capi",
#    "tools/dict-generate",
#    "tools/opencc-clip",
#    "tools/opencc-rs"
#]

[package]
name = "opencc-fmmseg"
version = "0.10.1"
edition = "2021"
autobenches = false # Disable auto-bench
authors = ["Laisuk Lai <laisuk@yahoo.com>"]
description = "High-performance Chinese conversion library (Simplified ↔ Traditional) using OpenCC lexicons and FMM segmentation — no runtime I/O, cross-platform, and production-ready."
license = "MIT"
repository = "https://github.com/laisuk/opencc-fmmseg"
homepage = "https://github.com/laisuk/opencc-fmmseg"
documentation = "https://docs.rs/opencc-fmmseg"
readme = "README.md"
keywords = ["opencc", "chinese", "nlp", "text-processing", "unicode"]
categories = ["text-processing", "localization", "command-line-utilities", "parser-implementations"]
include = [
    "Cargo.toml",
    "/LICENSE",
    # All source code
    "src/**/*.rs",
    "src/dictionary_lib/dicts/*.zstd",
    # Public text dictionaries
    "dicts/**"
]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
# Exact dependency pins to preserve MSRV (rustc 1.75.0):
# rayon@1.10.0, rayon-core@1.12.1, rustc-hash@2.1.1
rayon = { version = "=1.10", optional = true }
rayon-core = { version = "=1.12", optional = true }
regex = "1.12"
serde = { version = "1.0", features = ["derive"] }
serde_cbor = "0.11"
zstd = { version = "0.13.3", optional = true }
rustc-hash = "=2.1.1"

[features]
default = ["parallel", "zstd"]
parallel = ["dep:rayon", "dep:rayon-core"]
zstd = ["dep:zstd"]

[dev-dependencies]
tempfile = "3.27"
serde_json = "1.0"
#once_cell = "1.21"
#criterion = "0.7.0"

#[[bench]]
#name = "opencc_fmmseg_bench"
#harness = false

# Default: heavy optimization for libraries (C API performance)

#[profile.release]
#opt-level = 3            # Maximize speed (better suited for C API performance)
#codegen-units = 1          # Optimize across the entire codebase for better performance
#lto = "fat"                # Full Link Time Optimization for improved binary performance
#panic = "abort"            # Prevents Rust panics from unwinding, reducing binary size
#incremental = false        # Disable incremental builds to fully optimize the release binary
#strip = "symbols"          # Strips debug symbols while retaining export symbols needed for the C API
#debug = 0                  # No debug info in the final binary to reduce size

