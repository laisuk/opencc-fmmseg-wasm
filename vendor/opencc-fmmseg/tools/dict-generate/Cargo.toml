[package]
name = "dict-generate"
version = "0.11.0"
edition = "2021"

[dependencies]
opencc-fmmseg = { path = "../.." }
clap = "=4.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rustc-hash = "=2.1.1"

# Exact dependency pins to preserve MSRV (rustc 1.75.0):
# rustc-hash@2.1.1, clap_lex@1.0.1
clap_lex = "=1.0"

[build-dependencies]
winres = "0.1"